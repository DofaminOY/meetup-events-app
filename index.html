<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Meetup Events App</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/header.css" />
    <link rel="stylesheet" href="./css/hero.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="header__container">
          <a class="header__logo" href="./index.html">
            <img
              class="header__logo-img"
              src="./assets/svg/header/logo.svg"
              alt="Meetup logo"
            />
          </a>

          <form class="header__search">
            <label class="header__search-field">
              <img
                class="header__search-icon"
                src="./assets/svg/header/Search2.svg"
                alt=""
              />
              <input
                class="header__search-input"
                type="text"
                placeholder="Search events"
              />
            </label>

            <label class="header__location-field">
              <input
                class="header__location-input"
                type="text"
                value="Mountain View, CA"
              />
            </label>

            <button class="header__search-button" type="submit">
              <img
                class="header__search-button-icon"
                src="./assets/svg/header/Search.svg"
                alt=""
              />
            </button>
          </form>

          <div class="header__actions">
            <button class="header__language" type="button">
              <img
                class="header__earth-icon"
                src="./assets/svg/header/earth.svg"
                alt=""
              />
              <span>English</span>
            </button>

            <a class="header__login" href="#"> Log in </a>

            <a class="header__signup" href="#"> Sign up </a>
          </div>
        </div>
      </header>
      <main class="main">
        <section class="hero">
          <div class="hero__container">
            <div class="hero__content">
              <h1 class="hero__title">
                The people platform—Where interests become friendships
              </h1>

              <p class="hero__text">
                Whatever your interest, from hiking and reading to networking
                and skill sharing, there are thousands of people who share it on
                Meetup. Events are happening every day—sign up to join the fun.
              </p>

              <a class="hero__button" href="./index2.html"> Join Meetup </a>
            </div>

            <div class="hero__image-box">
              <img
                class="hero__image"
                src="./assets/svg/irl_event.svg"
                alt="People riding bikes"
              />
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./js/index.js"></script>
  </body>
</html>
